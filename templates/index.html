<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Text To Speech</title>

<link rel="icon" type="image/png" href="/static/logo.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#020617);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    width:420px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,255,255,0.15);
}

h1{
    margin-bottom:20px;
    color:#38bdf8;
    text-shadow:0 0 10px #38bdf8;
}

textarea{
    width:100%;
    height:130px;
    border:none;
    outline:none;
    resize:none;
    border-radius:12px;
    padding:15px;
    background:#111827;
    color:white;
    font-size:15px;
}

select{
    width:100%;
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#111827;
    color:white;
    font-size:15px;
}

.generate-btn{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#06b6d4;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.generate-btn:hover{
    background:#0891b2;
    transform:scale(1.03);
    box-shadow:0 0 20px #06b6d4;
}

.download-button{
    display:none;
    margin-top:20px;
    width:100%;
    padding:14px;
    border-radius:12px;
    background:#8b5cf6;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
    text-decoration:none;
    justify-content:center;
    align-items:center;
}

.download-button:hover{
    background:#7c3aed;
    box-shadow:0 0 20px #8b5cf6;
    transform:scale(1.03);
}

audio{
    margin-top:25px;
    width:100%;
}

.loader{
    margin-top:20px;
    display:none;
}

.spinner{
    width:40px;
    height:40px;
    border:4px solid rgba(255,255,255,0.2);
    border-top:4px solid #06b6d4;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.loading-text{
    margin-top:10px;
    color:#67e8f9;
}

</style>
</head>

<body>

<div class="container">

    <h1>Text To Speech AI</h1>

    <textarea
        id="text"
        placeholder="Enter your text here..."
    ></textarea>

    <select id="voiceMode" onchange="toggleVoiceUpload()">
        <option value="ana">Default Voice</option>
        <option value="clone">Clone My Voice</option>
    </select>

    <div id="voiceUploadContainer" style="display:none;">
        <input
            type="file"
            id="voiceFile"
            accept=".wav, .mp3"
            style="
                width:100%;
                margin-top:15px;
                padding:12px;
                background:#111827;
                color:white;
                border-radius:10px;
            "
        >
    </div>

    <select id="lang">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
    </select>

    <button class="generate-btn" onclick="generateAudio()">
        Generate Voice
    </button>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <div class="loading-text">
            Generating AI Voice...
        </div>
    </div>

    <audio id="audioPlayer" controls></audio>

    <a id="downloadBtn" class="download-button" download>
        🎧 Download Audio
    </a>

</div>

<script>

function toggleVoiceUpload(){

    const mode =
        document.getElementById("voiceMode").value;

    const uploadContainer =
        document.getElementById("voiceUploadContainer");

    if(mode === "clone"){
        uploadContainer.style.display = "block";
    }
    else{
        uploadContainer.style.display = "none";
    }
}

async function generateAudio(){
    
    console.log("Generate button clicked");

    const text = document.getElementById("text").value;
    const lang = document.getElementById("lang").value;

    if(text.trim() === ""){
        alert("Please enter some text!");
        return;
    }

    const loader = document.getElementById("loader");
    loader.style.display = "block";

    const voiceMode = document.getElementById("voiceMode").value;

    const formData = new FormData();

    formData.append("text", text);
    formData.append("lang", lang);
    formData.append("voice_mode", voiceMode);

    if(voiceMode === "clone"){

        const voiceFile = document.getElementById("voiceFile").files[0];

        if(!voiceFile){
            alert("Please upload a voice sample!");
            return;
        }

        formData.append("voice", voiceFile);
    }

    const response = await fetch("/generate",{
        method:"POST",
        body:formData
    });

    const data = await response.json();

    if(data.error){
        loader.style.display = "none";
        alert(data.error);
        return;
    }

    loader.style.display = "none";

    const player = document.getElementById("audioPlayer");

    player.src = data.audio_url;

    player.play();

    const downloadBtn = document.getElementById("downloadBtn");

    downloadBtn.href = data.audio_url;

    downloadBtn.style.display = "flex";
}

</script>

</body>
</html>
